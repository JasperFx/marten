version: '3'
services:
  postgresql:
    # Custom build layering PostGIS 3 + pgvector on top of the official
    # multi-arch `postgres:17` image (see docker/postgres/Dockerfile).
    # The Debian packages `postgresql-17-postgis-3` and
    # `postgresql-17-pgvector` are available on both amd64 and arm64, so
    # this works on Apple-silicon hosts. PLv8 was dropped — Marten core
    # SQL no longer requires it.
    build:
      context: ./docker/postgres
    # Postgres 17 keeps ~46MB of dynamic shared memory standing at boot
    # (dynamic_shared_memory_type=posix backs it with /dev/shm), so Docker's
    # default 64MB shm leaves parallel queries almost no headroom and the test
    # suite can fail with "53100: could not resize shared memory segment"
    shm_size: '512mb'
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: marten_testing
      NAMEDATALEN: 100
